name: CI

on:
    push:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: oven-sh/setup-bun@v2
            - run: bun install
            - run: bunx astro sync
            - run: bun run lint
